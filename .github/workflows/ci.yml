name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ecommerce-api:ci .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ecommerce-api:ci
          severity: CRITICAL
          exit-code: '1'
          trivyignores: .trivyignore

      - name: Smoke test - container starts and responds
        run: |
          docker run -d --name smoke-test -p 8000:8000 ecommerce-api:ci
          sleep 3
          curl -f http://localhost:8000/health
          docker rm -f smoke-test

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push image
        if: github.event_name == 'push'
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          IMAGE=$(echo $IMAGE | tr '[:upper:]' '[:lower:]')
          docker tag ecommerce-api:ci $IMAGE:${{ github.sha }}
          docker tag ecommerce-api:ci $IMAGE:latest
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

