name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t ecommerce-api:ci .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ecommerce-api:ci
          severity: CRITICAL
          exit-code: '1'

      - name: Smoke test - container starts and responds
        run: |
          docker run -d --name smoke-test -p 8000:8000 ecommerce-api:ci
          sleep 3
          curl -f http://localhost:8000/health
          docker rm -f smoke-test
